$kind: http-request
url: "{{baseUrl}}/user/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Test User",
      "email": "{{weakPasswordTestEmail}}",
      "password": "weak"
    }
scripts:
  - type: beforeRequest
    code: |-
      const uniqueEmail = `weakpass+${Date.now()}@example.com`;
      pm.environment.set('weakPasswordTestEmail', uniqueEmail);
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status code is 400', () => {
        pm.response.to.have.status(400);
      });

      pm.test('Error code is VALIDATION_ERROR', () => {
        const body = pm.response.json();
        pm.expect(body.errorCode).to.eql('VALIDATION_ERROR');
      });
    language: text/javascript
order: 4000
