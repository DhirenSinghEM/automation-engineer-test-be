$kind: http-request
url: "{{baseUrl}}/user/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "{{adminEmail}}",
      "password": "WrongPassword123!"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 400', () => {
        pm.response.to.have.status(400);
      });
    language: text/javascript
order: 7000
