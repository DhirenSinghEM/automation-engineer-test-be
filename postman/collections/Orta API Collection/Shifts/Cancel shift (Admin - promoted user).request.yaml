$kind: http-request
url: "{{baseUrl}}/shifts/{{shiftId}}/cancel"
method: PATCH
headers:
  Content-Type: application/json
  Authorization: Bearer {{newUserToken}}
scripts:
  - type: afterResponse
    code: |-
      const body = pm.response.json();

      pm.test('Status code is 200', () => {
          pm.response.to.have.status(200);
      });

      pm.test('Cancel successful', () => {
          pm.expect(body).to.have.property('message', 'Shift cancelled successfully');
      });
    language: text/javascript
order: 12000
