$kind: http-request
url: "{{baseUrl}}/shifts/{{shiftId}}/clock-in"
method: PATCH
headers:
  Content-Type: application/json
  Authorization: Bearer {{newUserToken}}
scripts:
  - type: afterResponse
    code: |-
      const body = pm.response.json();

      pm.test('Status code is 200', () => {
          pm.response.to.have.status(200);
      });

      pm.test('Clock-in successful', () => {
          pm.expect(body).to.have.property('shift');
          pm.expect(body).to.have.property('message');
          pm.expect(body.shift).to.have.property('clockInTime');
      });
    language: text/javascript
order: 9000
