$kind: http-request
url: "{{baseUrl}}/shifts/{{shiftId}}/clock-out"
method: PATCH
headers:
  Content-Type: application/json
  Authorization: Bearer {{newUserToken}}
scripts:
  - type: afterResponse
    code: |-
      const body = pm.response.json();

      pm.test('Status code is 200', () => {
          pm.response.to.have.status(200);
      });

      pm.test('Clock-out successful', () => {
          pm.expect(body).to.have.property('success', true);
          pm.expect(body.data).to.have.property('clockOutTime');
          pm.expect(body.data).to.have.property('totalHours');
      });
    language: text/javascript
order: 11000
