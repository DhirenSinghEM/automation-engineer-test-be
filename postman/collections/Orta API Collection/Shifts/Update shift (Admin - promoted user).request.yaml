$kind: http-request
url: "{{baseUrl}}/shifts/{{shiftId}}"
method: PUT
headers:
  Content-Type: application/json
  Authorization: Bearer {{newUserToken}}
body:
  type: json
  content: |-
    {
        "title": "Updated Shift Title - Automation"
    }
scripts:
  - type: afterResponse
    code: |-
      const body = pm.response.json();

      pm.test('Status code is 200', () => {
          pm.response.to.have.status(200);
      });

      pm.test('Shift updated successfully', () => {
          pm.expect(body).to.have.property('shift');
      });
    language: text/javascript
order: 8000
