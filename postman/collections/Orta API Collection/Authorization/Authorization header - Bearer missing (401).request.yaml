$kind: http-request
url: "{{baseUrl}}/shifts"
method: GET
headers:
  Authorization: JWT {{adminToken}}
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 401', () => {
        pm.response.to.have.status(401);
      });
      pm.test('Missing Bearer scheme returns AUTH_FAILED', () => {
        const body = pm.response.json();
        pm.expect(body.errorCode).to.eql('AUTH_FAILED');
      });
    language: text/javascript
order: 8000
