$kind: http-request
url: "{{baseUrl}}/shifts"
method: GET
headers:
  Authorization: "{{adminToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 401', () => {
        pm.response.to.have.status(401);
      });
      pm.test('Malformed auth header returns AUTH_FAILED', () => {
        const body = pm.response.json();
        pm.expect(['AUTH_HEADER_INVALID', 'AUTH_HEADER_INVALID_SCHEME', 'AUTH_FAILED']).to.include(body.errorCode);
      });
    language: text/javascript
order: 9000
