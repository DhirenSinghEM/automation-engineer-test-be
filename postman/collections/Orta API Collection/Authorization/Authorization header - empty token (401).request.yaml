$kind: http-request
url: "{{baseUrl}}/shifts"
method: GET
headers:
  Authorization: "Bearer "
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 401', () => {
        pm.response.to.have.status(401);
      });
      pm.test('Empty token returns AUTH_FAILED', () => {
        const body = pm.response.json();
        pm.expect(body.errorCode).to.eql('AUTH_FAILED');
      });
    language: text/javascript
order: 10000
