$kind: http-request
url: "{{baseUrl}}/shifts?page=1&limit=10"
method: GET
headers:
  Authorization: Bearer {{adminToken}}
queryParams:
  page: "1"
  limit: "10"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', () => {
        pm.response.to.have.status(200);
      });
      pm.test('Admin can access admin-only endpoint', () => {
        const body = pm.response.json();
        pm.expect(body).to.have.property('shifts');
      });
    language: text/javascript
order: 1000
